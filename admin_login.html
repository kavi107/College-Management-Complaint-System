<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — CMS Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #080b1a;
      --card: #0d1230;
      --crimson: #c62828;
      --red: #ef5350;
      --gold: #ffd740;
      --white: #f0f4ff;
      --muted: #7a8299;
      --border: rgba(255,255,255,0.08);
    }
    body {
      min-height: 100vh;
      background: var(--dark);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .bg-grid {
      position: fixed; inset: 0;
      background-image: 
        linear-gradient(rgba(198,40,40,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(198,40,40,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }
    .bg-glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(198,40,40,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 440px;
      position: relative;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(198,40,40,0.1);
      animation: slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .shield-icon {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, var(--crimson), #b71c1c);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 30px rgba(198,40,40,0.4);
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--white);
      text-align: center;
      margin-bottom: 0.4rem;
    }
    .card-sub {
      color: var(--muted);
      text-align: center;
      font-size: 0.88rem;
      margin-bottom: 2.5rem;
    }
    .badge {
      display: inline-block;
      background: rgba(198,40,40,0.15);
      border: 1px solid rgba(198,40,40,0.3);
      color: var(--red);
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 1rem; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem; color: var(--muted);
      pointer-events: none;
    }
    input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s;
      outline: none;
    }
    input:focus {
      border-color: var(--red);
      background: rgba(198,40,40,0.06);
      box-shadow: 0 0 0 3px rgba(198,40,40,0.12);
    }
    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--crimson), #8b0000);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(198,40,40,0.4);
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
    .demo-info {
      background: rgba(255,215,64,0.06);
      border: 1px solid rgba(255,215,64,0.15);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-bottom: 1.5rem;
    }
    .demo-info p {
      color: var(--gold);
      font-size: 0.8rem;
      margin-bottom: 0.3rem;
      font-weight: 500;
    }
    .demo-info small { color: var(--muted); font-size: 0.75rem; }
    .student-link {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .student-link a {
      color: #64b5f6;
      text-decoration: none;
    }
    .toast {
      position: fixed;
      top: 1.5rem; right: 1.5rem;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      font-size: 0.9rem;
      z-index: 9999;
      transform: translateX(200%);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.show { transform: translateX(0); }
    .toast.error { background: rgba(255,82,82,0.15); border: 1px solid #ff5252; color: #ff5252; }
    .toast.success { background: rgba(105,240,174,0.12); border: 1px solid #69f0ae; color: #69f0ae; }
    .loading-dots { display: inline-flex; gap: 4px; }
    .loading-dots span { width: 6px; height: 6px; background: white; border-radius: 50%; animation: blink 1s infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="login-card">
    <div class="shield-icon">🛡️</div>
    <div style="text-align:center; margin-bottom:0.5rem;">
      <span class="badge">Restricted Access</span>
    </div>
    <h2 class="card-title">Admin Portal</h2>
    <p class="card-sub">College Complaint Management System</p>

    <div class="demo-info">
      <p>📋 Demo Credentials</p>
      <small>Super Admin: admin / admin123 &nbsp;|&nbsp; HOD: hodcse / hod123</small>
    </div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="username" placeholder="Enter admin username" />
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔐</span>
        <input type="password" id="password" placeholder="Enter password" />
      </div>
    </div>
    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Access Admin Dashboard</button>

    <div class="student-link">
      <br>Are you a student? <a href="/student/login">Student Portal →</a>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    function setLoading(loading) {
      const btn = document.getElementById('loginBtn');
      if (loading) {
        btn.dataset.orig = btn.textContent;
        btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
        btn.disabled = true;
      } else {
        btn.textContent = btn.dataset.orig;
        btn.disabled = false;
      }
    }

    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) return showToast('Please enter credentials', 'error');
      setLoading(true);
      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Access granted! Loading dashboard...', 'success');
          setTimeout(() => window.location.href = data.redirect, 800);
        } else {
          showToast(data.message, 'error');
          setLoading(false);
        }
      } catch(e) {
        showToast('Connection error', 'error');
        setLoading(false);
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
